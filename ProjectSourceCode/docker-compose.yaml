services:
  db:
    image: postgres
    env_file: .env
    expose:
      - '5432'
    volumes:
      - ./init_data:/docker-entrypoint-initdb.d
  web:
    image: node:lts
    user: 'node' 
    working_dir: /home/node/app
    env_file: .env
    environment:
      - NODE_ENV=test
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./:/home/node/app
    command: 'sh -c "npm install && npm test"'
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - db
    ports:
      - '8000:5000'
    volumes:
      - .:/app
    command: 'python -m flask --app api/server run --host=0.0.0.0'

volumes:
  virtrade: