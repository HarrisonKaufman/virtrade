services:
  db:
    image: postgres
    env_file: .env
    expose:
      - '5432'
    volumes:
      - group-project:/var/lib/postgresql
      - ./init_data:/docker-entrypoint-initdb.d
  web:
    image: node:lts
    working_dir: /repository
    env_file: .env
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    ports:
      - '3000:3000'
    volumes:
      - ./:/repository
      - /repository/node_modules
    command: 'npm run testandrun' 
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      - db
    ports:
      - '8000:5000'
    volumes:
      - .:/app
    command: 'python -m flask --app api/server run --host=0.0.0.0'
volumes:
  group-project:
